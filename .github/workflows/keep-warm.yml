name: Keep MIRA Warm

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes — prevents Azure SWA cold starts
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping warm endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 40 "https://www.vowsandvedas.com/api/warm")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warm ping returned $STATUS — cold start may occur on next request"
          fi
